<!DOCTYPE html>
<html>
<head>
    <title>Proctor Vision Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        async function startEngine() {
            const res = await fetch('/start');
            const data = await res.json();
            alert(data.status);
        }

        async function stopEngine() {
            const res = await fetch('/stop');
            const data = await res.json();
            alert(data.status);
        }

        async function fetchStatus() {
            const res = await fetch('/status');
            const status = await res.json();
            document.getElementById("status").innerText = JSON.stringify(status, null, 2);
        }

        async function fetchViolations() {
            const res = await fetch('/violations');
            const logs = await res.json();
            document.getElementById("violations").innerText = JSON.stringify(logs, null, 2);
        }

        setInterval(() => {
            fetchStatus();
            fetchViolations();
        }, 2000);
    </script>
</head>
<body>
    <h1>Proctor Vision Engine</h1>
    <button onclick="startEngine()">Start</button>
    <button onclick="stopEngine()">Stop</button>

    <h2>Status</h2>
    <pre id="status">Waiting...</pre>

    <h2>Violations</h2>
    <pre id="violations">None</pre>
</body>
</html>
